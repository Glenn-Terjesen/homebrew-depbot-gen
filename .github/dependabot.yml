---
version: 2
updates:
- package-ecosystem: "github-actions"
  directories:
  - /.github/workflows
  groups:
    minor-and-patch:
      applies-to: version-updates
      update-types:
      - "minor"
      - "patch"
  schedule:
    interval: "weekly"
    time: "09:00"
    timezone: "UTC"
    day: "monday"
  open-pull-requests-limit: 2
  cooldown:
    days: 7
